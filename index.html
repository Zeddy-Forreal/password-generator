<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style/main.css">
    <link rel="icon" href="static/icon.png">
</head>
<body>
    <main>
        <header>Password Generator</header>
        <div class="password_container">
            <p class="password">Generate Now!..</p>
            <button class="copy"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-copy"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M7 9.667a2.667 2.667 0 0 1 2.667 -2.667h8.666a2.667 2.667 0 0 1 2.667 2.667v8.666a2.667 2.667 0 0 1 -2.667 2.667h-8.666a2.667 2.667 0 0 1 -2.667 -2.667l0 -8.666" /><path d="M4.012 16.737a2.005 2.005 0 0 1 -1.012 -1.737v-10c0 -1.1 .9 -2 2 -2h10c.75 0 1.158 .385 1.5 1" /></svg></button>
        </div>
        <section>
            <div>
                <p>password length</p>
                <p class="num">15</p>
            </div>
            <div class="ranges">
                <input type="range" class="range" min="0" max="100" minlength="1" maxlength="3" value="15">
                <span></span>
                <span class="progress"></span>
            </div>
            <div class="boxes">
                
                <div>
                    <input type="checkbox" class="box uppercase">
                    <p>include uppercase letters</p>
                </div>
                <div>
                    <input type="checkbox" class="box lowercase">
                    <p>include lowercase letters</p>
                </div>
                <div>
                    <input type="checkbox" class="box numbers">
                    <p>include numbers</p>
                </div>
                <div>
                    <input type="checkbox" class="box symbols">
                    <p>include symbols</p>
                </div>
            </div>
            <button class="gen">Generate <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-arrow-badge-right"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M13 7h-6l4 5l-4 5h6l4 -5l-4 -5" /></svg></button>
        </section>
    </main>
    <script src="script/main.js"></script>
</body>
</html>
